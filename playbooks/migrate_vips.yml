---
- name: Migrate VIPs and their underlying objects between F5 BIG-IP partitions
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/main.yml
    - ../vars/migration.yml
  tasks:
    - name: Create destination partition
      ansible.builtin.import_tasks: ../tasks/01_create_partition.yml

    - name: Discover source objects to migrate
      ansible.builtin.import_tasks: ../tasks/02_discover.yml

    - name: Migrate monitors
      ansible.builtin.import_tasks: ../tasks/03_migrate_monitors.yml

    - name: Migrate profiles
      ansible.builtin.import_tasks: ../tasks/05_migrate_profiles.yml

    - name: Migrate pools and pool members
      ansible.builtin.import_tasks: ../tasks/06_migrate_pools.yml

    # Everything above is non-destructive and safe to re-run: (memberless)
    # pools, monitors and custom profiles now exist in dest_partition
    # alongside the still-live original VS. Pool members, their backing
    # nodes, and the VS's destination IP can't exist in both partitions at
    # once, though, so none of those can be staged the same way - they
    # require an explicit cutover.
    - name: Cutover virtual servers (move pool members/nodes, remove VS from source, recreate in destination)
      ansible.builtin.import_tasks: ../tasks/07_cutover_virtual_servers.yml
      when: cutover_virtual_servers | bool

    - name: Skip cutover
      ansible.builtin.debug:
        msg: >-
          Pools (without members)/monitors/profiles were staged in
          {{ dest_partition }}, but cutover_virtual_servers is false, so pool
          members, nodes and the VS itself were left untouched in
          {{ source_partition }}. Re-run with -e cutover_virtual_servers=true
          once you're ready for the brief cutover.
      when: not (cutover_virtual_servers | bool)

    - name: Remove remaining originals from the source partition
      ansible.builtin.import_tasks: ../tasks/08_cleanup_source.yml
      when: remove_source_after_migration | bool and cutover_virtual_servers | bool

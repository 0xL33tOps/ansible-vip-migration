---
- name: Recreate pools in destination partition
  f5networks.f5_modules.bigip_pool:
    name: "{{ item.name }}"
    partition: "{{ dest_partition }}"
    lb_method: "{{ item.lb_method | default(omit) }}"
    description: "{{ item.description | default(omit) }}"
    slow_ramp_time: "{{ item.slow_ramp_time | default(omit) }}"
    reselect_tries: "{{ item.reselect_tries | default(omit) }}"
    service_down_action: "{{ item.service_down_action | default(omit) }}"
    # bigip_device_info returns the pool's own health monitor(s) directly as
    # item.monitors (undocumented, but present on the live API response).
    # Fall back to the first member's monitors only if that's ever absent.
    monitor_type: "{{ (('and_list' if (pool_monitors | length > 1) else 'single')) if (pool_monitors | length > 0) else omit }}"
    monitors: "{{ pool_monitors | map('basename') | map('extract', monitor_path_map) | list if (pool_monitors | length > 0) else omit }}"
    state: present
    provider: "{{ provider }}"
  loop: "{{ migrate_pools }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    pool_monitors: "{{ item.monitors | default((item.members | default([]) | first | default({})).monitors | default([])) }}"

# Pool members are NOT created here. A pool member can only reference a node
# in /Common or its own partition, and the nodes backing these members
# currently live in source_partition (or an earlier hop's partition) - not
# dest_partition. Moving a node (its address is unique device-wide, so it
# can't simply be duplicated) is therefore a brief, real interruption like
# the VS cutover itself, so pool members are created in
# tasks/07_cutover_virtual_servers.yml, gated behind cutover_virtual_servers,
# right after the backing nodes are moved into dest_partition.

---
# Note: only the most commonly customized fields are carried over for each
# profile type. Review recreated profiles for highly customized settings
# that are not listed here (e.g. forward-proxy SSL, HSTS, header rewriting).

- name: Recreate Client SSL profiles in destination partition
  f5networks.f5_modules.bigip_profile_client_ssl:
    name: "{{ item_name_with_folder }}"
    partition: "{{ dest_partition }}"
    parent: "/{{ source_partition }}/{{ item.parent | regex_replace('^/?' + source_partition + '/', '') }}"
    ciphers: "{{ item.ciphers | default(omit) }}"
    cert_key_chain:
      - name: default
        cert: "{{ item.certificate_file }}"
        key: "{{ item.key_file }}"
        chain: "{{ item.chain_file | default(omit) }}"
    sni_default: "{{ item.sni_default | default(omit) }}"
    sni_require: "{{ item.sni_require | default(omit) }}"
    allow_non_ssl: "{{ item.allow_non_ssl | default(omit) }}"
    state: present
    provider: "{{ provider }}"
  loop: "{{ migrate_client_ssl_profiles }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    # Folder-aware: a profile that lived in a sub-folder of source_partition
    # is recreated in the same-named sub-folder of dest_partition.
    item_folder: >-
      {{
        (item.full_path | regex_replace('^/[^/]+/(.+)/[^/]+$', '\1'))
        if (item.full_path | regex_findall('/') | length >= 3 and (preserve_folders | default(true) | bool))
        else ''
      }}
    item_name_with_folder: "{{ (item_folder + '/' + item.name) if item_folder else item.name }}"
  when: item.certificate_file is defined and item.key_file is defined


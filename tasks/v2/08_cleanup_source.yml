---
# Only runs when remove_source_after_migration=true AND
# cutover_virtual_servers=true. By this point the VS, pool members and their
# backing nodes are already gone from source_partition - see
# tasks/07_cutover_virtual_servers.yml. Deletes the remaining originals
# (the now-empty pools, custom monitors, custom profiles) from
# source_partition now that the copies in dest_partition exist and are live.

- name: Remove pools from source partition
  f5networks.f5_modules.bigip_pool:
    name: "{{ item_name_with_folder }}"
    partition: "{{ source_partition }}"
    state: absent
    provider: "{{ provider }}"
  loop: "{{ migrate_pools }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    # Folder-aware: delete from the same sub-folder the object was
    # originally observed in (full_path here is still source_partition's).
    item_folder: >-
      {{
        (item.full_path | regex_replace('^/[^/]+/(.+)/[^/]+$', '\1'))
        if (item.full_path | regex_findall('/') | length >= 3 and (preserve_folders | default(true) | bool))
        else ''
      }}
    item_name_with_folder: "{{ (item_folder + '/' + item.name) if item_folder else item.name }}"

